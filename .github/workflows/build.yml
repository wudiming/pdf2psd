name: 🏗️ Build & Release

# 触发条件：
#   - 推送 vX.Y.Z 格式的 tag（自动发布 Release）
#   - 手动触发（workflow_dispatch），只构建不发布
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # 允许创建 GitHub Release

# ══════════════════════════════════════════════════════════════════════════════
# 🪟 Windows — 单文件便携 .exe（双击直接运行）
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon
        run: python assets/make_icon.py

      - name: Build portable .exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "PDF2PSD" `
            --icon "assets\icon.ico" `
            --collect-all customtkinter `
            app.py
          Move-Item dist\PDF2PSD.exe PDF2PSD-Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: PDF2PSD-Windows.exe
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 🍎 macOS — .app 打包进 .dmg（拖到任意位置双击运行）
# ══════════════════════════════════════════════════════════════════════════════
  build-macos:
    name: 🍎 macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Generate icon (PNG for macOS)
        run: python assets/make_icon.py

      - name: Convert PNG to ICNS (macOS)
        run: |
          mkdir -p icon.iconset
          sips -z 16 16   assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32   assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32   assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64   assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out icon.iconset/icon_256x256@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Build .app bundle
        run: |
          pyinstaller \
            --windowed \
            --name "PDF2PSD" \
            --icon "assets/icon.icns" \
            --collect-all customtkinter \
            app.py

      - name: Package as DMG
        run: |
          mkdir -p dmg_src
          cp -r "dist/PDF2PSD.app" dmg_src/
          # 可选：创建 Applications 快捷方式方便拖入
          ln -s /Applications dmg_src/Applications

          hdiutil create \
            -volname "PDF2PSD" \
            -srcfolder dmg_src \
            -ov -format UDZO \
            PDF2PSD-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: PDF2PSD-macOS.dmg
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 🐧 Linux — AppImage 单文件（chmod +x 后双击运行）
# ══════════════════════════════════════════════════════════════════════════════
  build-linux:
    name: 🐧 Linux
    runs-on: ubuntu-22.04   # ubuntu-20.04 已被淘汰，改用 22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          # libfuse2 用于 AppImage；ubuntu-22.04 上包名不变
          sudo apt-get install -y python3-tk xvfb libfuse2 file

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller (onedir, for AppImage)
        run: |
          xvfb-run --auto-servernum pyinstaller \
            --onedir \
            --windowed \
            --name PDF2PSD \
            --collect-all customtkinter \
            app.py

      - name: Create AppImage
        run: |
          # ── 下载 appimagetool ──────────────────────────────────────────────
          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          # ── 组装 AppDir 结构 ───────────────────────────────────────────────
          mkdir -p AppDir
          cp -r dist/PDF2PSD/* AppDir/

          # AppRun 入口脚本
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}:${PATH}"
          exec "${HERE}/PDF2PSD" "$@"
          EOF
          chmod +x AppDir/AppRun

          # .desktop 描述文件（文件管理器用）
          cat > AppDir/PDF2PSD.desktop << 'EOF'
          [Desktop Entry]
          Name=PDF2PSD
          Comment=PDF 转 PSD 转换工具 - 每页变独立图层
          Exec=PDF2PSD
          Icon=PDF2PSD
          Type=Application
          Categories=Graphics;Office;
          EOF

          # ── 用 Python 生成图标 PNG ─────────────────────────────────────────
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          size = 256
          img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
          d = ImageDraw.Draw(img)
          # 深色圆形背景
          d.ellipse([4, 4, size-4, size-4], fill=(22, 27, 45, 255))
          # 蓝色环
          d.ellipse([18, 18, size-18, size-18], outline=(74, 158, 255, 255), width=14)
          # 简单 "P" 形图标
          d.rectangle([72, 68, 94, 192], fill=(74, 158, 255, 255))
          d.ellipse([72, 68, 152, 148], fill=(74, 158, 255, 255))
          d.ellipse([84, 80, 140, 136], fill=(22, 27, 45, 255))
          img.save("AppDir/PDF2PSD.png")
          PYEOF

          # ── 构建 AppImage ──────────────────────────────────────────────────
          # APPIMAGE_EXTRACT_AND_RUN=1 让 appimagetool 不依赖 FUSE（ubuntu-22.04 兼容）
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir PDF2PSD-Linux.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: PDF2PSD-Linux.AppImage
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 🔌 Photoshop 插件 — 打包 UXP .ccx + JSX 脚本
# ══════════════════════════════════════════════════════════════════════════════
  build-plugin:
    name: 🔌 Photoshop Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package UXP plugin as .ccx
        run: |
          cd photoshop-plugin/uxp
          # .ccx 就是 ZIP 改后缀；排除开发用文件
          zip -r ../../PDF2PSD-Photoshop-Plugin.ccx . \
            --exclude "node_modules/*" \
            --exclude ".gitignore" \
            --exclude "package.json" \
            --exclude "package-lock.json"
          cd ../..
          echo "CCX size: $(du -sh PDF2PSD-Photoshop-Plugin.ccx)"

      - name: Copy JSX script
        run: cp photoshop-plugin/jsx/pdf_to_layers.jsx PDF2PSD-jsx-script.jsx

      - name: Upload CCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-plugin-ccx
          path: PDF2PSD-Photoshop-Plugin.ccx
          retention-days: 7

      - name: Upload JSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-plugin-jsx
          path: PDF2PSD-jsx-script.jsx
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 🚀 发布 GitHub Release（仅在推送 tag 时触发）
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: 🚀 Create Release
    needs: [build-windows, build-macos, build-linux, build-plugin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: artifacts/

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: build-macos
          path: artifacts/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: artifacts/

      - name: Download Plugin CCX
        uses: actions/download-artifact@v4
        with:
          name: build-plugin-ccx
          path: artifacts/

      - name: Download Plugin JSX
        uses: actions/download-artifact@v4
        with:
          name: build-plugin-jsx
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PDF2PSD ${{ github.ref_name }}"
          body: |
            ## 📦 PDF → PSD 转换工具 ${{ github.ref_name }}

            将多页 PDF 转换为单个 PSD 文件，**每页自动成为独立图层**，无需安装 Photoshop。

            ---

            ### 📥 下载（便携版，无需安装，不写入系统目录）

            | 类型 | 文件 | 使用方式 |
            |------|------|----------|
            | 🪟 Windows 独立工具 | `PDF2PSD-Windows.exe` | 双击直接运行 |
            | 🍎 macOS 独立工具 | `PDF2PSD-macOS.dmg` | 挂载后拖 .app 到任意位置运行 |
            | 🐧 Linux 独立工具 | `PDF2PSD-Linux.AppImage` | `chmod +x` 后运行 |
            | 🔌 PS 插件（UXP） | `PDF2PSD-Photoshop-Plugin.ccx` | 双击安装到 Photoshop |
            | 📜 PS 脚本（JSX） | `PDF2PSD-jsx-script.jsx` | 拷贝到 PS Scripts 目录 |

            ---

            ### 🔌 Photoshop 插件安装说明
            **UXP 插件（PS 2021+，推荐）**
            > 下载 `PDF2PSD-Photoshop-Plugin.ccx`，双击即可安装到 Photoshop。
            > 安装后在菜单 **插件 → PDF2PSD** 打开面板。

            **JSX 脚本（所有 PS 版本）**
            > 下载 `PDF2PSD-jsx-script.jsx`，拷贝到 Photoshop 的 Scripts 目录：
            > - Windows: `C:\Program Files\Adobe\Adobe Photoshop XXXX\Presets\Scripts\`
            > - macOS: `/Applications/Adobe Photoshop XXXX/Presets/Scripts/`
            > 重启 PS 后在 **文件 → 脚本** 菜单找到。

            ---

            ### ⚠️ macOS 首次运行说明
            macOS Gatekeeper 可能提示「无法验证开发者」：
            > 右键点击 .app → 打开 → 再次点击「打开」

            ### 🐧 Linux 使用方法
            ```bash
            chmod +x PDF2PSD-Linux.AppImage
            ./PDF2PSD-Linux.AppImage
            ```
          files: |
            artifacts/PDF2PSD-Windows.exe
            artifacts/PDF2PSD-macOS.dmg
            artifacts/PDF2PSD-Linux.AppImage
            artifacts/PDF2PSD-Photoshop-Plugin.ccx
            artifacts/PDF2PSD-jsx-script.jsx
          draft: false
          prerelease: false
