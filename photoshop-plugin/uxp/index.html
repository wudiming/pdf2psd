<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF → PSD</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <span class="logo">PDF</span><span class="arrow"> → </span><span class="logo-right">PSD</span>
    <p class="subtitle">每页转为独立图层</p>
  </header>

  <!-- ── File Drop Zone ─────────────────────────────────────── -->
  <div id="dropZone" class="drop-zone">
    <div class="drop-icon" id="dropIcon">📂</div>
    <div class="drop-title" id="dropTitle">点击选择 PDF 文件</div>
    <div class="drop-sub"  id="dropSub">支持多页 PDF</div>
  </div>

  <!-- ── Settings ───────────────────────────────────────────── -->
  <section class="settings-card">

    <div class="setting-row">
      <label>总页数</label>
      <div class="setting-right">
        <input type="number" id="pageInput" min="1" max="9999" value="1" style="width:60px; text-align:center" />
      </div>
    </div>

    <div class="setting-row" style="margin-top:10px">
      <label>渲染 DPI</label>
      <div class="setting-right">
        <span class="value-label" id="dpiLabel">150</span>
        <input type="range" id="dpiSlider" min="72" max="300" step="1" value="150" />
      </div>
    </div>
    <div class="dpi-presets">
      <button data-dpi="72">屏幕 72</button>
      <button data-dpi="150" class="active">标准 150</button>
      <button data-dpi="300">印刷 300</button>
    </div>

    <div class="setting-row" style="margin-top:10px">
      <label>图层命名</label>
      <select id="namingSelect">
        <option value="zh">第 1 页 / 第 2 页…</option>
        <option value="en">Page 1 / Page 2…</option>
        <option value="num">1 / 2 / 3…</option>
      </select>
    </div>

  </section>

  <!-- ── Progress ───────────────────────────────────────────── -->
  <div class="progress-card" id="progressCard" style="display:none">
    <div class="progress-label" id="progressLabel">准备中…</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- ── Status ─────────────────────────────────────────────── -->
  <div class="status" id="statusMsg">请先选择 PDF 文件</div>

  <!-- ── Action Button ──────────────────────────────────────── -->
  <button id="convertBtn" class="btn-primary" disabled>
    开始转换
  </button>

  <script src="index.js"></script>
</body>
</html>
